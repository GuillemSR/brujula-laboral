<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brujula Laboral</title>
    <link rel="stylesheet" href="/static/styles.css?v=placeholder-1" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Brujula Laboral</h1>
        <p>Placeholder temporal para probar backend, RAG, Ollama y documentos.</p>
      </header>

      <section class="box" aria-labelledby="ask-title">
        <h2 id="ask-title">Consulta</h2>
        <form id="ask-form">
          <label for="question">Pregunta laboral</label>
          <textarea
            id="question"
            name="question"
            rows="5"
            maxlength="4000"
            placeholder="Escribe aqui la consulta..."
            required
          ></textarea>
          <div class="row">
            <span id="question-count">0 / 4000</span>
            <div class="actions">
              <div id="document-form" class="clip-form">
                <button
                  id="upload-button"
                  class="clip-button"
                  type="button"
                  aria-label="Adjuntar documento temporal"
                  aria-describedby="document-warning"
                >
                  📎
                </button>
                <input
                  id="document-file"
                  name="file"
                  type="file"
                  accept=".txt,.md,.pdf,.docx"
                  hidden
                />
                <span id="document-warning" class="tooltip" role="tooltip">
                  Documento temporal: no se guarda por defecto, no se indexa en el RAG y se
                  usa solo para esta consulta.
                </span>
              </div>
              <button id="ask-button" type="submit">Enviar</button>
            </div>
          </div>
          <div id="document-status" class="status" aria-live="polite">
            Sin documento adjunto.
          </div>
        </form>
      </section>

      <section id="result" class="box result" aria-live="polite" aria-label="Resultado" hidden>
        <h2>Resultado</h2>
        <p>La respuesta aparecera aqui.</p>
      </section>
    </main>
    <script src="/static/app.js?v=placeholder-1"></script>
  </body>
</html>
