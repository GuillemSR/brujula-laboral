<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brujula Laboral</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="chat">
        <header>
          <h1>Brujula Laboral</h1>
          <p>Orientacion laboral y sindical con fuentes verificables.</p>
        </header>

        <form id="ask-form">
          <label for="question">Consulta</label>
          <textarea
            id="question"
            name="question"
            rows="6"
            placeholder="Ejemplo: ¿Me pueden despedir estando de baja?"
            required
          ></textarea>
          <button type="submit">Consultar</button>
        </form>

        <section id="result" class="result" aria-live="polite"></section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
